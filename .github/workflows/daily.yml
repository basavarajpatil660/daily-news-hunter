name: Daily News Hunter

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  run-news-hunter:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run News Hunter
        env:
          PYTHONUNBUFFERED: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          NEWS_CATEGORIES: ${{ secrets.NEWS_CATEGORIES }}
          NEWS_REGION: ${{ secrets.NEWS_REGION }}
          NEWS_LANGUAGE: ${{ secrets.NEWS_LANGUAGE }}
          TOP_ARTICLES_COUNT: ${{ secrets.TOP_ARTICLES_COUNT }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          MAX_ARTICLES_TO_SCORE: ${{ secrets.MAX_ARTICLES_TO_SCORE }}
        run: python main.py
